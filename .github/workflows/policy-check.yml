name: policy-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  policy-as-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install OPA
        run: |
          curl -sSL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/opa
          opa version

      - name: Unit test policies
        run: opa test policies/ -v

      - name: Install Conftest
        run: |
          VERSION=0.56.0
          curl -sSL -o conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz conftest && sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Gate must pass on a compliant plan
        run: conftest test examples/compliant.plan.json -p policies

      - name: Gate must catch a violating plan
        run: |
          if conftest test examples/violating.plan.json -p policies; then
            echo "FAIL: violating plan passed the gate"; exit 1
          else
            echo "OK: violating plan was correctly blocked"
          fi
